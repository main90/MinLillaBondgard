<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Min Lilla Bondgård</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none;transition:background 2s}

.sky{position:fixed;top:0;left:0;right:0;height:45vh;transition:background 2s;z-index:0}
.sky.spring{background:linear-gradient(180deg,#5ba3d9,#87CEEB 60%,#b5e5ff)}
.sky.summer{background:linear-gradient(180deg,#2980b9,#6dd5fa 60%,#fff)}
.sky.autumn{background:linear-gradient(180deg,#c06014,#e8a050 50%,#f0d080)}
.sky.winter{background:linear-gradient(180deg,#6c7a89,#aab7c4 60%,#dde4ea)}
body.spring{background:#87CEEB}body.summer{background:#6dd5fa}body.autumn{background:#e8a050}body.winter{background:#aab7c4}

.sun{position:fixed;top:18px;right:28px;width:50px;height:50px;border-radius:50%;z-index:1;animation:pulse 3s ease-in-out infinite;transition:all 1s}
.sun.sunny{background:#FFD700;box-shadow:0 0 40px #FFD700}.sun.rainy{background:#7f8c8d}.sun.cloudy{background:#bdc3c7}.sun.snowy{background:#ecf0f1;box-shadow:0 0 30px rgba(236,240,241,0.5)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

.cloud{position:fixed;background:white;border-radius:50px;opacity:.8;z-index:1;animation:drift linear infinite}
.cloud:nth-child(2){top:30px;left:-100px;width:120px;height:40px;animation-duration:25s}
.cloud:nth-child(3){top:70px;left:-150px;width:160px;height:50px;animation-duration:35s;animation-delay:5s}
.cloud:nth-child(4){top:50px;left:-80px;width:100px;height:35px;animation-duration:30s;animation-delay:12s}
@keyframes drift{from{transform:translateX(-200px)}to{transform:translateX(calc(100vw + 200px))}}

.weather-particles{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1;pointer-events:none;overflow:hidden}
.raindrop{position:absolute;width:2px;background:linear-gradient(transparent,rgba(100,149,237,.6));animation:rain linear infinite}
@keyframes rain{0%{transform:translateY(-10px);opacity:1}100%{transform:translateY(100vh);opacity:.3}}
.snowflake{position:absolute;color:white;animation:snow linear infinite;opacity:.9}
@keyframes snow{0%{transform:translateY(-10px) rotate(0)}100%{transform:translateY(100vh) rotate(360deg)}}

.gc{position:relative;z-index:2;max-width:720px;margin:0 auto;padding:12px;min-height:100vh}

.header{background:rgba(139,90,43,.92);color:white;padding:12px 16px;border-radius:18px;margin-bottom:10px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.header-row{display:flex;align-items:center;gap:12px}
.header-left{cursor:pointer;text-align:center;flex-shrink:0}
.header-left:active{opacity:.8}
.header-center{flex:1;min-width:0;text-align:center}
.header-right{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px}
.header h1{font-size:1.3em;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stats{display:flex;justify-content:center;gap:10px;font-size:1.05em;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:20px;font-size:.85em;display:inline-block}
.w-badge{background:rgba(255,255,255,.2)}

.tabs{display:flex;gap:4px;margin-bottom:10px}
.tab{flex:1;padding:11px 3px;border:none;border-radius:14px 14px 4px 4px;font-size:1em;font-weight:700;cursor:pointer;background:rgba(255,255,255,.5);color:#5a3e1b}
.tab.active{background:#6B8E23;color:white;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.tab{position:relative}
.tab-badge{position:absolute;top:-4px;right:-2px;background:#e74c3c;color:white;font-size:.65em;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.3);animation:badgePop .3s ease}
@keyframes badgePop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}

.panel{display:none;background:rgba(255,255,255,.88);border-radius:20px;padding:18px;box-shadow:0 4px 16px rgba(0,0,0,.15);min-height:55vh;font-size:1.05em}
.panel.active{display:block}

/* Farm grid */
.farm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.plot{aspect-ratio:1;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:4px solid #6B4F10;position:relative;font-size:3em;min-height:100px;background:#8B6914}
.plot:active{transform:scale(.95)}.plot.growing{background:#4a7c10}.plot.ready{background:#2d8b2d;animation:bounce .5s ease-in-out infinite}
.plot.needs-water{background:#a08020;animation:wiggle 1s ease-in-out infinite}
.plot.locked{background:#888;border-color:#666;opacity:.35;cursor:default}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-1.5deg)}75%{transform:rotate(1.5deg)}}
.plot-label{font-size:.28em;color:white;margin-top:2px;font-weight:700}
.pbar{position:absolute;bottom:8px;left:10%;width:80%;height:8px;background:rgba(0,0,0,.3);border-radius:4px;overflow:hidden}
.pfill{height:100%;background:#7CFC00;border-radius:4px;transition:width .5s}

.seed-sel{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.seed-btn{padding:8px 12px;border:3px solid transparent;border-radius:12px;font-size:1.05em;cursor:pointer;background:#f0e6d0}
.seed-btn.sel{border-color:#6B8E23;background:#d4edaa}

/* Animals */
.a-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
.a-card{background:#f5eedd;border-radius:16px;padding:16px;text-align:center;cursor:pointer;border:3px solid #ddd0b8}
.a-card:active{transform:scale(.97)}
.a-card .ae{font-size:3.2em}.a-card .an{font-weight:700;color:#5a3e1b;margin:4px 0;font-size:1.1em}.a-card .ai{font-size:.95em;color:#888}
.a-card.happy{border-color:#7CFC00;background:#efffea}
.a-card.needs-care{border-color:#FFA500;animation:wiggle .5s ease-in-out infinite}
.a-card.hungry{border-color:#e74c3c;background:#fdeaea}
.buy-btn{display:block;width:100%;padding:14px;margin-top:10px;border:3px dashed #aaa;border-radius:16px;background:#fafafa;font-size:1.15em;cursor:pointer;color:#888}

/* Shop */
.customer{background:#fff8e8;border-radius:16px;padding:14px;margin-bottom:10px;border:3px solid #f0d890;display:flex;align-items:center;gap:12px}
.customer .ce{font-size:2.8em}.customer-info{flex:1}
.cn{font-weight:700;color:#5a3e1b;font-size:1.1em}.cw{font-size:.95em;color:#666;margin:2px 0}
.sell-btn{padding:10px 16px;background:#6B8E23;color:white;border:none;border-radius:12px;font-size:1.05em;font-weight:700;cursor:pointer}
.sell-btn:disabled{background:#ccc;cursor:default}
.inv{background:#f0e6d0;border-radius:14px;padding:12px;margin-bottom:10px}
.inv h3{color:#5a3e1b;margin-bottom:5px;font-size:1.1em}
.inv-items{display:flex;flex-wrap:wrap;gap:6px}
.inv-item{background:white;padding:5px 9px;border-radius:10px;font-size:1em}

/* Build – Canvas farm map */
.farm-canvas-wrap{border-radius:18px;margin-bottom:12px;border:3px solid #5a8020;overflow:hidden;position:relative}
.farm-canvas{width:100%;display:block;image-rendering:auto}
.farm-map-hdr{position:absolute;top:0;left:0;right:0;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;pointer-events:none}
.farm-map-hdr span{color:white;font-weight:700;text-shadow:1px 1px 3px rgba(0,0,0,.5);font-size:1em}
.farm-progress{display:flex;align-items:center;gap:6px;font-size:.75em;color:white;font-weight:700;text-shadow:1px 1px 3px rgba(0,0,0,.5)}
.farm-prog-bar{width:70px;height:8px;background:rgba(0,0,0,.3);border-radius:4px;overflow:hidden}
.farm-prog-fill{height:100%;background:linear-gradient(90deg,#7CFC00,#4CAF50);border-radius:4px}

.bsec{margin-bottom:14px}
.bsec h3{color:#5a3e1b;margin-bottom:8px;font-size:1.1em}
.bgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.bcard{background:#f8f3e8;border-radius:14px;padding:14px;text-align:center;border:3px solid #e8dcc8;cursor:pointer}
.bcard:active{transform:scale(.97)}.bcard.owned{border-color:#7CFC00;background:#efffea}.bcard.locked{opacity:.4;cursor:default}
.bcard .be{font-size:2.6em}.bcard .bn{font-weight:700;color:#5a3e1b;font-size:1em;margin:3px 0}
.bcard .bc{font-size:.9em;color:#888}.bcard .bd{font-size:.8em;color:#aaa;margin-top:2px}
.bcard.owned .bc{color:#4CAF50}


/* Modal */
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:20px}
.mo.show{display:flex}
.modal{background:white;border-radius:22px;padding:22px;max-width:380px;width:100%;text-align:center}
.modal h2{color:#5a3e1b;margin-bottom:8px;font-size:1.3em}
.modal-opts{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.mopt{padding:14px;border:3px solid #ddd;border-radius:14px;background:#fafafa;cursor:pointer;font-size:1.1em}
.mopt:active{background:#e8f5d0;border-color:#6B8E23}
.mclose{margin-top:10px;padding:10px 22px;background:#ccc;border:none;border-radius:12px;font-size:1.05em;cursor:pointer}

/* Save slots */
.slot-grid{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.slot-card{display:flex;align-items:center;gap:12px;padding:14px;border:3px solid #ddd;border-radius:14px;background:#fafafa;cursor:pointer;text-align:left;font-size:1em;width:100%}
.slot-card:active{background:#e8f5d0;border-color:#6B8E23}
.slot-card.active-slot{border-color:#6B8E23;background:#efffea}
.slot-card .slot-icon{font-size:2em;flex-shrink:0}
.slot-card .slot-info{flex:1;min-width:0}
.slot-card .slot-name{font-weight:700;color:#5a3e1b;font-size:1.05em}
.slot-card .slot-details{font-size:.85em;color:#888;margin-top:2px}
.slot-card .slot-empty{color:#aaa;font-style:italic}
.slot-del{background:none;border:none;font-size:1.2em;cursor:pointer;padding:4px 8px;border-radius:8px;opacity:.5}
.slot-del:hover{opacity:1;background:rgba(231,76,60,.1)}
.switch-user-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);color:white;padding:4px 12px;border-radius:12px;font-size:.85em;cursor:pointer;margin-top:4px}
.switch-user-btn:active{background:rgba(255,255,255,.35)}

/* Farmer avatar */
.farmer-avatar{font-size:2em;line-height:1;position:relative}
.farmer-avatar .fa-hat{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:.55em}
.farmer-name{color:rgba(255,255,255,.9);font-size:.95em;font-weight:600}

/* Farmer editor */
.fe-preview{font-size:4em;text-align:center;margin:10px 0;line-height:1;position:relative;display:inline-block}
.fe-preview .fa-hat{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:.5em}
.fe-section{margin:10px 0}
.fe-section label{display:block;font-weight:700;color:#5a3e1b;font-size:.95em;margin-bottom:5px}
.fe-options{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.fe-opt{width:44px;height:44px;border:3px solid #ddd;border-radius:12px;font-size:1.5em;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fafafa}
.fe-opt:active{transform:scale(.95)}
.fe-opt.sel{border-color:#6B8E23;background:#e8f5d0}

/* Toast & Level up */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(0,0,0,.85);color:white;padding:16px 26px;border-radius:16px;font-size:1.2em;z-index:200;pointer-events:none;transition:transform .3s;text-align:center;max-width:85vw}
.toast.show{transform:translate(-50%,-50%) scale(1)}
.lvl{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,#FFD700,#FFA500);color:white;padding:28px 36px;border-radius:24px;font-size:1.6em;z-index:200;text-align:center;box-shadow:0 0 60px rgba(255,215,0,.5);transition:transform .4s}
.lvl.show{transform:translate(-50%,-50%) scale(1)}

/* ===== MOBILE ===== */
@media(max-width:480px){
  .gc{padding:8px 6px}
  .header{padding:8px 10px;border-radius:14px;margin-bottom:8px}
  .header-row{gap:8px}
  .header h1{font-size:1em}
  .stats{gap:6px;font-size:.9em}
  .badge{font-size:.75em;padding:2px 6px}

  /* Tabs: icon only */
  .tabs{gap:3px;margin-bottom:8px}
  .tab{padding:10px 2px;font-size:1.3em;line-height:1}
  .tab .tab-label{display:none}

  /* Panels */
  .panel{padding:12px 10px;border-radius:14px;font-size:1em}

  /* Seed buttons: icon only */
  .seed-btn{padding:8px 10px;font-size:1.2em}
  .seed-btn .seed-label{display:none}

  /* Farm grid */
  .farm-grid{gap:6px}
  .plot{font-size:2.5em;min-height:80px;border-width:3px;border-radius:12px}
  .plot-label{font-size:.3em}

  /* Animal grid */
  .a-grid{gap:8px}
  .a-card{padding:12px;border-radius:12px}
  .a-card .ae{font-size:2.6em}
  .a-card .an{font-size:1em}

  /* Build grid */
  .bgrid{gap:6px}
  .bcard{padding:10px;border-radius:12px}
  .bcard .be{font-size:2.2em}
  .bcard .bn{font-size:.9em}

  /* Shop */
  .customer{padding:10px;gap:8px;border-radius:12px}
  .customer .ce{font-size:2.2em}

  /* Inventory */
  .inv{padding:8px 10px;border-radius:10px}

  /* Modal */
  .modal{padding:18px;border-radius:18px;max-width:92vw}
  .switch-user-btn{font-size:.8em;padding:3px 10px}
  .slot-card{padding:10px;gap:8px}
  .slot-card .slot-icon{font-size:1.6em}
  .farmer-avatar{font-size:1.6em}
  .farmer-name{font-size:.65em}
  .fe-opt{width:38px;height:38px;font-size:1.3em}
  .fe-preview{font-size:3em}
}
</style>
</head>
<body class="spring">
<div class="sky spring"></div><div class="sun sunny"></div>
<div class="cloud"></div><div class="cloud"></div><div class="cloud"></div>
<div class="weather-particles" id="wp"></div>

<div class="gc">
  <div class="header">
    <div class="header-row">
      <div class="header-left" onclick="showFarmerEditor()" title="Anpassa din bonde">
        <div class="farmer-avatar" id="farmerAvatar">👩‍🌾</div>
        <div class="farmer-name" id="farmerNameDisplay" style="font-size:.7em;margin-top:2px">Bansen</div>
      </div>
      <div class="header-center">
        <h1 id="farmTitle">🌻 Min Lilla Bondgård 🌻</h1>
        <div class="stats">
          <span>💰 <span id="coins">30</span></span>
          <span>⭐ Nivå <span id="level">1</span></span>
          <span title="Erfarenhet — samla XP genom att skörda, samla och sälja!">🌟 <span id="xp">0</span>/<span id="xpMax">20</span> XP</span>
        </div>
      </div>
      <div class="header-right">
        <div class="badge w-badge" id="wBadge" style="font-size:.8em">☀️ Sol · 🌸 Vår</div>
        <button class="switch-user-btn" onclick="showSlotSelector()">👤 Byt</button>
      </div>
    </div>
    <div class="badge" id="neighborBadge" style="display:none;cursor:pointer;margin-top:4px;text-align:center" onclick="payNeighbor()"></div>
  </div>

  <div class="inv" id="globalInv" style="margin-bottom:8px"><h3>📦 Lager</h3><div class="inv-items" id="globalInvItems"><span style="color:#999">Tomt!</span></div></div>

  <div class="tabs">
    <button class="tab active" onclick="sTab('farm')">🌱<span class="tab-label"> Odla</span></button>
    <button class="tab" onclick="sTab('animals')">🐔<span class="tab-label"> Djur</span></button>
    <button class="tab" onclick="sTab('shop')">🏪<span class="tab-label"> Butik</span></button>
    <button class="tab" onclick="sTab('build')">🏡<span class="tab-label"> Gård</span></button>
    <button class="tab" onclick="sTab('dev')" id="dev-tab" style="background:rgba(255,100,100,.4);font-size:.85em;display:none">🔧 Dev</button>
  </div>

  <div id="farm-panel" class="panel active"></div>
  <div id="animals-panel" class="panel"></div>
  <div id="shop-panel" class="panel"></div>
  <div id="build-panel" class="panel"></div>
  <div id="dev-panel" class="panel" style="display:none"></div>
</div>

<div class="mo" id="modal"><div class="modal" id="mc"></div></div>
<div class="toast" id="toast"></div>
<div class="lvl" id="lvlUp"></div>

<script>
// ===== DEV MODE =====
if(new URLSearchParams(location.search).get('dev')==='true'){
  document.getElementById('dev-tab').style.display='';
  document.getElementById('dev-panel').style.display='';
}
// ===== STATE =====
const S = {
  coins:75, xp:0, level:1, xpToNext:20, selectedSeed:'carrot', farmName:'',
  farmerName:'', farmerSkin:0, farmerHair:0, farmerHat:0, farmerShirt:0,
  maxPlots:1, maxAnimals:1,
  plots:[ {type:null,elapsed:0,ready:false,watered:false} ],
  animals:[],
  inventory:{}, customers:[], buildings:{}, decorations:{},
  houseLevel:0,
  hasSprinkler:false,
  neighborDebt:0, neighborMood:'happy', neighborTimer:0,
  season:'spring', weather:'sunny', wTimer:0, sTimer:0, dayCount:0,
  pondTimer:0, siloTimer:0
};

const FARMER_SKINS=['👩‍🌾','👨‍🌾','🧑‍🌾','👧','👦','🧒','👩','👨','🧑','👵','👴','🧓'];
const FARMER_HATS=['','🎩','🧢','👒','🪖','🎀','👑','🌸','🌻'];
const FARMER_SHIRTS=['','🟢','🔵','🔴','🟡','🟣','🟤','⚪','🟠'];

// ===== DATA =====
const SEEDS = {
  carrot:    {e:'🥕',n:'Morot',    c:5,  t:20, v:12, xp:3},
  lettuce:   {e:'🥬',n:'Sallad',   c:4,  t:16, v:9,  xp:2},
  potato:    {e:'🥔',n:'Potatis',  c:7,  t:24, v:15, xp:4},
  tomato:    {e:'🍅',n:'Tomat',    c:8,  t:28, v:18, xp:5},
  corn:      {e:'🌽',n:'Majs',     c:10, t:36, v:24, xp:6},
  strawberry:{e:'🍓',n:'Jordgubbe',c:12, t:40, v:30, xp:8},
  pumpkin:   {e:'🎃',n:'Pumpa',    c:15, t:50, v:38, xp:10, season:'autumn'},
  sunflower: {e:'🌻',n:'Solros',   c:10, t:32, v:22, xp:5,  season:'summer'}
};

const ANIMALS = {
  chicken:{e:'🐔',n:'Höna',c:30,prod:'🥚',pn:'Ägg',  intr:30,v:10,xp:3,food:'🌽'},
  pig:    {e:'🐷',n:'Gris',c:50,prod:'🥓',pn:'Bacon',intr:40,v:18,xp:5,food:'🥔'},
  sheep:  {e:'🐑',n:'Får', c:60,prod:'🧶',pn:'Ull',  intr:44,v:20,xp:5,food:'🥬'},
  cow:    {e:'🐄',n:'Ko',  c:80,prod:'🥛',pn:'Mjölk',intr:50,v:25,xp:6,food:'🥕'}
};

const HOUSE_UPG = [
  {e:'⛺',n:'Tält',      c:0,   d:'Ditt första hem'},
  {e:'🛖',n:'Koja',      c:100, d:'Tak över huvudet!',    lv:1},
  {e:'🏚️',n:'Stuga',    c:250, d:'En riktig liten stuga',lv:2},
  {e:'🏠',n:'Hus',       c:550, d:'Ett fint hus',         lv:3},
  {e:'🏡',n:'Stort hus', c:900, d:'Hus med trädgård',     lv:4},
  {e:'🏰',n:'Herrgård',  c:1500,d:'En riktig herrgård!',  lv:5}
];

const MAX_PLOTS=16, MAX_STALLS=6;
function plotCost(n){return 35+n*20}
function stallCost(n){return 50+n*35}

const BUILDINGS = {
  fence:     {e:'🪵',n:'Staket',       c:80,  d:'Kunder betalar 15% mer',   lv:1},
  scarecrow: {e:'🧑‍🌾',n:'Fågelskrämma', c:90,  d:'Grödor växer 20% snabbare',lv:1},
  mailbox:   {e:'📫',n:'Brevlåda',     c:50,  d:'+1 kund i butiken',        lv:1},
  flowers:   {e:'🌷',n:'Blomrabatt',   c:60,  d:'Djuren blir gladare',      lv:1},
  well:      {e:'🪣',n:'Brunn',        c:175, d:'Grödor torkar inte ut',    lv:2},

const WEATHER = {sunny:{e:'☀️',n:'Sol',g:1},rainy:{e:'🌧️',n:'Regn',g:1.5},cloudy:{e:'☁️',n:'Moln',g:.8},snowy:{e:'🌨️',n:'Snö',g:.3}};

// ===== WEATHER =====
function growSpeed(){let m=SEASON[S.season].g*WEATHER[S.weather].g;if(S.buildings.greenhouse)m=Math.max(m,.8);if(S.buildings.scarecrow)m*=1.2;return m}

function updWeather(){
  S.wTimer++;
  if(S.wTimer>=60){S.wTimer=0;
    const m={winter:['snowy','snowy','cloudy','sunny'],summer:['sunny','sunny','sunny','cloudy','rainy'],autumn:['cloudy','cloudy','rainy','sunny'],spring:['sunny','sunny','rainy','cloudy']};
    S.weather=m[S.season][Math.floor(Math.random()*m[S.season].length)];updWVis();}
}
function updSeason(){
  S.sTimer++;
  if(S.sTimer>=240){S.sTimer=0;S.dayCount++;
    const s=['spring','summer','autumn','winter'];S.season=s[(s.indexOf(S.season)+1)%4];S.wTimer=25;updWVis();
    toast(`${SEASON[S.season].e} Nu är det ${SEASON[S.season].n}!`);}
}
function updWVis(){
  document.querySelector('.sky').className='sky '+S.season;
  document.querySelector('.sun').className='sun '+S.weather;
  document.body.className=S.season;
  document.getElementById('wBadge').textContent=`${WEATHER[S.weather].e} ${WEATHER[S.weather].n} · ${SEASON[S.season].e} ${SEASON[S.season].n}`;
  const c=document.getElementById('wp');c.innerHTML='';
  if(S.weather==='rainy')for(let i=0;i<40;i++){const d=document.createElement('div');d.className='raindrop';d.style.left=Math.random()*100+'%';d.style.height=(15+Math.random()*20)+'px';d.style.animationDuration=(.4+Math.random()*.3)+'s';d.style.animationDelay=Math.random()*2+'s';c.appendChild(d);}
  else if(S.weather==='snowy')for(let i=0;i<25;i++){const f=document.createElement('div');f.className='snowflake';f.textContent='❄';f.style.left=Math.random()*100+'%';f.style.fontSize=(10+Math.random()*12)+'px';f.style.animationDuration=(3+Math.random()*4)+'s';f.style.animationDelay=Math.random()*5+'s';c.appendChild(f);}
  // Rain auto-waters crops
  if(S.weather==='rainy')S.plots.forEach(p=>{if(p.type)p.watered=true;});
}

function render(){
  document.getElementById('coins').textContent=S.coins;

  document.getElementById('xp').textContent=S.xp;
  document.getElementById('xpMax').textContent=S.xpToNext;

function rGlobalInv(){
  const inv=Object.entries(S.inventory).filter(([,c])=>c>0);
  const el=document.getElementById('globalInvItems');
  if(!inv.length){el.innerHTML='<span style="color:#999">Tomt!</span>';return;}
  let h='';
  const extra={Fisk:'🐟'};
  inv.forEach(([item,cnt])=>{const s=SEEDS[item],a=Object.values(ANIMALS).find(x=>x.pn===item);
    h+=`<span class="inv-item">${s?s.e:a?a.prod:extra[item]||'📦'} ${s?s.n:item} x${cnt}</span>`;});
  el.innerHTML=h;
}

function rBadges(){
  const tabs=document.querySelectorAll('.tab');
  // Farm: any plot ready to harvest or needs watering
  const farmBadge=S.plots.some(p=>p.ready)||(S.plots.some(p=>p.type&&!p.watered&&!S.hasSprinkler));
  // Animals: any hungry or ready to collect
  const aniBadge=S.animals.some(a=>a.hungry||a.readyToCollect);
  // Shop: any customers waiting AND we have inventory to sell
  const shopBadge=S.customers.some(c=>(S.inventory[c.wants]||0)>=c.amount);
  // Set badges (tabs order: farm, animals, shop, build, dev)
  [farmBadge,aniBadge,shopBadge,false,false].forEach((b,i)=>{
    if(!tabs[i])return;
    const existing=tabs[i].querySelector('.tab-badge');
    if(b&&!existing){const d=document.createElement('span');d.className='tab-badge';d.textContent='!';tabs[i].appendChild(d);tabs[i].style.position='relative';}
    else if(!b&&existing)existing.remove();
  });
}

function rFarm(){
  const p=document.getElementById('farm-panel'),sp=growSpeed();
  const sl=sp>=1.3?'🚀 Snabb tillväxt!':sp<=.5?'🐢 Långsam tillväxt':sp<=.8?'☁️ Lite långsammare':'';
  let h='<div class="seed-sel">';
  for(const[id,s]of Object.entries(SEEDS)){
    if(s.season&&s.season!==S.season&&!S.buildings.greenhouse)continue;
    h+=`<button class="seed-btn ${S.selectedSeed===id?'sel':''}" onclick="selSeed('${id}')">${s.e}<span class="seed-label"> ${s.n}<br><small>${s.c} 💰</small></span></button>`;}
  h+='</div>';
  if(sl)h+=`<div style="text-align:center;font-size:.9em;color:#666;margin-bottom:6px">${sl}</div>`;
  h+=`<div style="text-align:center;font-size:.9em;color:#5a3e1b;margin-bottom:6px">🌱 Rutor: ${S.maxPlots} · 🐔 Stall: ${S.maxAnimals}${S.hasSprinkler?' · 💦 Vattenspridare':''}</div>`;
  // XP progress bar
  const xpPct=Math.round((S.xp/S.xpToNext)*100);
  h+=`<div style="margin:0 auto 10px;max-width:300px"><div style="display:flex;justify-content:space-between;font-size:.8em;color:#888;margin-bottom:2px"><span>⭐ Nivå ${S.level}</span><span>🌟 ${S.xp}/${S.xpToNext} XP</span></div><div style="height:10px;background:rgba(0,0,0,.1);border-radius:5px;overflow:hidden"><div style="height:100%;width:${xpPct}%;background:linear-gradient(90deg,#f0c040,#e8a020);border-radius:5px;transition:width .5s"></div></div><div style="text-align:center;font-size:.75em;color:#aaa;margin-top:2px">Du får XP av att skörda, samla från djur, sälja & bygga. Vid ${S.xpToNext} XP når du nivå ${S.level+1}!</div></div>`;

  const show=Math.max(S.maxPlots,3);
  h+='<div class="farm-grid">';
  for(let i=0;i<show;i++){
    if(i>=S.maxPlots){h+=`<div class="plot locked"><span>🔒</span><span class="plot-label">Bygg fler i Gård-fliken</span></div>`;continue;}
    const pl=S.plots[i];
    if(!pl||!pl.type){
      h+=`<div class="plot" onclick="plant(${i})"><span>🕳️</span><span class="plot-label">Plantera</span></div>`;
    } else if(pl.ready){
      h+=`<div class="plot ready" onclick="harvest(${i})"><span>${SEEDS[pl.type].e}</span><span class="plot-label">Skörda!</span></div>`;
    } else if(!pl.watered && !S.hasSprinkler){
      h+=`<div class="plot needs-water" onclick="water(${i})"><span>🌱</span><span class="plot-label">💧 Vattna!</span></div>`;
    } else {
      const pr=Math.min(100,(pl.elapsed/SEEDS[pl.type].t)*100);
      h+=`<div class="plot growing"><span>🌱</span><span class="plot-label">${SEEDS[pl.type].n}</span><div class="pbar"><div class="pfill" style="width:${pr}%"></div></div></div>`;
    }
  }
  h+='</div>';
  p.innerHTML=h;
}

// ===== CANVAS FARM DRAWING =====
let _farmT=0;
function drawFarm(cv){
  const W=cv.width,H=cv.height,c=cv.getContext('2d');
  _farmT++;
  // Grass
  c.fillStyle='#6aaa28';c.fillRect(0,0,W,H);
  for(let i=0;i<60;i++){c.fillStyle=`rgba(${80+Math.random()*40},${150+Math.random()*40},${20+Math.random()*30},0.15)`;const x=((i*97)%W),y=((i*53)%H);c.beginPath();c.ellipse(x,y,12+Math.random()*18,8+Math.random()*12,0,0,Math.PI*2);c.fill();}
  // Dirt path from center to bottom
  c.fillStyle='#9a7a48';c.beginPath();c.moveTo(W*.46,H*.55);c.quadraticCurveTo(W*.47,H*.75,W*.48,H);c.lineTo(W*.54,H);c.quadraticCurveTo(W*.53,H*.75,W*.54,H*.55);c.fill();
  c.fillStyle='#8a6a38';for(let y=H*.56;y<H;y+=12){c.fillRect(W*.48,y,2,4);c.fillRect(W*.52,y+6,2,4);}
  // Path to stall (lower left)
  if(S.maxAnimals>0){c.fillStyle='#9a7a48';c.beginPath();c.moveTo(W*.43,H*.55);c.quadraticCurveTo(W*.3,H*.6,W*.18,H*.65);c.lineTo(W*.2,H*.68);c.quadraticCurveTo(W*.32,H*.62,W*.45,H*.57);c.fill();}
  // === FENCE ===
  if(S.buildings.fence){
    const m=12,pw=5;c.strokeStyle='#8B6914';c.lineWidth=pw;c.strokeRect(m,m,W-m*2,H-m*2);
    c.fillStyle='#6B4F10';
    for(let x=m;x<W-m;x+=28){c.fillRect(x-2,m-3,6,pw+6);c.fillRect(x-2,H-m-3,6,pw+6);}
    for(let y=m;y<H-m;y+=28){c.fillRect(m-3,y-2,pw+6,6);c.fillRect(W-m-3,y-2,pw+6,6);}
    // Horizontal rails
    c.strokeStyle='#a07820';c.lineWidth=2;
    [.33,.66].forEach(f=>{c.beginPath();c.moveTo(m,m+(H-m*2)*f);c.lineTo(W-m,m+(H-m*2)*f);c.stroke();});
    // Gate
    c.fillStyle='#6aaa28';c.fillRect(W*.42,H-m-3,W*.16,pw+8);
    c.fillStyle='#9a7a48';c.fillRect(W*.44,H-m+1,W*.12,6);
  }
  // === CROP ZONE (upper right) ===
  const cropX=W*.58,cropY=H*.04,cropW=W*.38,cropH=H*.38;
  if(S.maxPlots>0){
    c.fillStyle='rgba(80,50,20,0.25)';roundRect(c,cropX-6,cropY-6,cropW+12,cropH+12,8);c.fill();
  }
  const cols=4,rows=Math.ceil(MAX_PLOTS/cols);
  const cw=cropW/cols,ch=cropH/rows;
  for(let i=0;i<S.maxPlots&&i<MAX_PLOTS;i++){
    const col=i%cols,row=Math.floor(i/cols);
    const px=cropX+col*cw+3,py=cropY+row*ch+3,pw=cw-6,ph=ch-6;
    const pl=S.plots[i];
    if(pl&&pl.type&&pl.ready){
      c.fillStyle='#3a7a18';roundRect(c,px,py,pw,ph,4);c.fill();
      const glow=Math.sin(_farmT*.15)*3;c.shadowColor='rgba(100,255,50,.4)';c.shadowBlur=6+glow;c.fillStyle='#2d8b18';roundRect(c,px,py,pw,ph,4);c.fill();c.shadowBlur=0;
      drawPlants(c,px,py,pw,ph,'ready',SEEDS[pl.type].e);
    } else if(pl&&pl.type&&!pl.watered&&!S.hasSprinkler){
      c.fillStyle='#8a6a28';roundRect(c,px,py,pw,ph,4);c.fill();
      drawPlants(c,px,py,pw,ph,'dry');
    } else if(pl&&pl.type){
      c.fillStyle='#4a8a20';roundRect(c,px,py,pw,ph,4);c.fill();
      drawPlants(c,px,py,pw,ph,'grow');
    } else {
      c.fillStyle='#6a4a20';roundRect(c,px,py,pw,ph,4);c.fill();
      c.strokeStyle='rgba(150,120,60,.4)';c.lineWidth=1;c.setLineDash([3,3]);c.strokeRect(px+2,py+2,pw-4,ph-4);c.setLineDash([]);
      for(let r=0;r<3;r++){c.fillStyle='rgba(50,30,10,.15)';c.fillRect(px+4,py+4+r*(ph/3),pw-8,1);}
    }
  }
  // === STALL (lower left) — grows with maxAnimals ===
  if(S.maxAnimals>=1){
    const tier=S.maxAnimals<=1?0:S.maxAnimals<=2?1:S.maxAnimals<=4?2:3;
    const sw=[W*.08,W*.13,W*.20,W*.28][tier],sh=[H*.07,H*.10,H*.15,H*.20][tier];
    const sx=W*.10,sy=H*.72-sh;
    // Shadow
    c.fillStyle='rgba(0,0,0,.06)';c.beginPath();c.ellipse(sx+sw/2,sy+sh+2,sw*.6,3,0,0,Math.PI*2);c.fill();
    if(tier===0){
      // Tiny wooden shed
      c.fillStyle='#8a6a40';c.fillRect(sx,sy+sh*.3,sw,sh*.7);
      c.fillStyle='#6a4a28';c.beginPath();c.moveTo(sx-2,sy+sh*.33);c.lineTo(sx+sw/2,sy);c.lineTo(sx+sw+2,sy+sh*.33);c.closePath();c.fill();
      c.fillStyle='#4a3018';c.fillRect(sx+sw*.3,sy+sh*.5,sw*.4,sh*.5);
    } else {
      // Barn body
      c.fillStyle=tier>=2?'#a03420':'#9a4a30';roundRect(c,sx,sy+sh*.25,sw,sh*.75,3);c.fill();
      c.fillStyle='#7a2010';c.fillRect(sx+3,sy+sh*.25+3,sw-6,2);
      // Roof
      c.fillStyle=tier>=2?'#c04828':'#a84020';c.beginPath();c.moveTo(sx-3,sy+sh*.28);c.lineTo(sx+sw/2,sy);c.lineTo(sx+sw+3,sy+sh*.28);c.closePath();c.fill();
      c.strokeStyle='#6a1808';c.lineWidth=1;c.stroke();
      // Door
      c.fillStyle='#5a1808';const dw=sw*.2,dx=sx+sw/2-dw/2;roundRect(c,dx,sy+sh*.5,dw,sh*.48,2);c.fill();
      // X on door
      c.strokeStyle='#3a0808';c.lineWidth=1.5;c.beginPath();c.moveTo(dx+3,sy+sh*.55);c.lineTo(dx+dw-3,sy+sh*.85);c.moveTo(dx+dw-3,sy+sh*.55);c.lineTo(dx+3,sy+sh*.85);c.stroke();
      // Windows at tier 2+
      if(tier>=2){c.fillStyle='rgba(255,255,200,.5)';c.fillRect(sx+5,sy+sh*.4,sw*.1,sw*.08);c.fillRect(sx+sw-5-sw*.1,sy+sh*.4,sw*.1,sw*.08);}
      // Hay loft at tier 3
      if(tier>=3){c.fillStyle='#d4a040';c.beginPath();c.ellipse(sx+sw/2,sy+sh*.15,sw*.08,sh*.06,0,0,Math.PI*2);c.fill();}
    }
  }
  // Animals around stall
  const animPos=[[W*.12,H*.76],[W*.22,H*.78],[W*.08,H*.80],[W*.30,H*.76],[W*.16,H*.83],[W*.26,H*.82]];
  S.animals.forEach((a,i)=>{
    if(i>=animPos.length)return;
    const[ax,ay]=animPos[i],t=ANIMALS[a.type];
    const bob=Math.sin(_farmT*.1+i*2)*2,y=ay+bob;
    // Shadow
    c.fillStyle='rgba(0,0,0,.1)';c.beginPath();c.ellipse(ax,ay+12,9,3,0,0,Math.PI*2);c.fill();

    if(a.type==='chicken'){
      // Body
      c.fillStyle='#e8c840';c.beginPath();c.ellipse(ax,y+2,8,6,0,0,Math.PI*2);c.fill();
      // Wing
      c.fillStyle='#d4a830';c.beginPath();c.ellipse(ax+4,y+2,5,4,.3,0,Math.PI*2);c.fill();
      // Head
      c.fillStyle='#e8c840';c.beginPath();c.arc(ax-6,y-4,5,0,Math.PI*2);c.fill();
      // Eye
      c.fillStyle='#1a1a1a';c.beginPath();c.arc(ax-8,y-5,1.2,0,Math.PI*2);c.fill();
      // Beak
      c.fillStyle='#e08020';c.beginPath();c.moveTo(ax-10,y-4);c.lineTo(ax-14,y-3);c.lineTo(ax-10,y-2);c.closePath();c.fill();
      // Comb
      c.fillStyle='#d03030';c.beginPath();c.arc(ax-6,y-9,3,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(ax-4,y-8,2.5,0,Math.PI*2);c.fill();
      // Wattle
      c.fillStyle='#d03030';c.beginPath();c.ellipse(ax-8,y-1,2,3,0,0,Math.PI*2);c.fill();
      // Legs
      c.strokeStyle='#c07020';c.lineWidth=1.5;
      c.beginPath();c.moveTo(ax-3,y+7);c.lineTo(ax-4,y+12);c.stroke();
      c.beginPath();c.moveTo(ax+2,y+7);c.lineTo(ax+3,y+12);c.stroke();
    } else if(a.type==='pig'){
      // Body
      c.fillStyle='#f0b0b0';c.beginPath();c.ellipse(ax,y+2,11,8,0,0,Math.PI*2);c.fill();
      // Head
      c.fillStyle='#f0b0b0';c.beginPath();c.arc(ax-9,y-2,7,0,Math.PI*2);c.fill();
      // Snout
      c.fillStyle='#e89090';c.beginPath();c.ellipse(ax-14,y-1,4,3,0,0,Math.PI*2);c.fill();

function drawPlants(c,px,py,pw,ph,state,emoji){
  const rows=2,cols=3;
  for(let r=0;r<rows;r++)for(let cl=0;cl<cols;cl++){
    const x=px+6+cl*(pw-12)/(cols-1),y=py+6+r*(ph-12)/(rows-1);
    if(state==='ready'){c.fillStyle='#2a6a10';c.beginPath();c.moveTo(x,y+6);c.lineTo(x-4,y-2);c.lineTo(x+4,y-2);c.closePath();c.fill();c.fillStyle='#d04020';c.beginPath();c.arc(x,y-3,3,0,Math.PI*2);c.fill();}
    else if(state==='grow'){c.fillStyle='#4aaa28';c.fillRect(x-1,y,2,6);c.fillStyle='#5aba38';c.beginPath();c.ellipse(x,y-1,3,2,0,0,Math.PI*2);c.fill();}
    else{c.fillStyle='#8a7a40';c.fillRect(x-1,y+2,2,4);}
  }
}
function drawSmallBuilding(c,x,y,color,w,h){c.fillStyle=color;c.fillRect(x-w/2,y,w,h);}
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

function rBuild(){
  const p=document.getElementById('build-panel');let h='';
  const house=HOUSE_UPG[S.houseLevel];
  const totalB=Object.keys(BUILDINGS).length,ownedB=Object.keys(S.buildings).length,ownedD=Object.keys(S.decorations||{}).length;
  const progPct=Math.round(((S.maxPlots+S.maxAnimals+ownedB+ownedD+S.houseLevel)/(MAX_PLOTS+MAX_STALLS+totalB+12+5))*100);

  // === CANVAS MAP ===
  h+='<div class="farm-canvas-wrap"><canvas id="farmCv" class="farm-canvas" width="500" height="500"></canvas>';
  h+='<div class="farm-map-hdr"><span>Din bondgård</span><span class="farm-progress">'+progPct+'%<span class="farm-prog-bar"><span class="farm-prog-fill" style="width:'+progPct+'%"></span></span></span></div></div>';

  // === HOUSE UPGRADE ===
  h+='<div class="bsec"><h3>🏠 Ditt hem: '+house.e+' '+house.n+'</h3>';
  if(S.houseLevel<HOUSE_UPG.length-1){
    const nx=HOUSE_UPG[S.houseLevel+1],ok=S.coins>=nx.c&&(!nx.lv||S.level>=nx.lv);
    h+=`<div class="bcard ${ok?'':'locked'}" onclick="upgHouse()" style="margin-bottom:10px"><div class="be">${house.e} ➡️ ${nx.e}</div><div class="bn">Uppgradera till ${nx.n}</div><div class="bc">💰 ${nx.c}</div><div class="bd">${nx.d}${nx.lv&&S.level<nx.lv?` (Nivå ${nx.lv})`:''}</div></div>`;
  } else h+='<div class="bcard owned" style="margin-bottom:10px"><div class="be">🏰</div><div class="bn">Max nivå!</div><div class="bc">✅ Fullt uppgraderat</div></div>';
  h+='</div>';

  // === EXPAND FARM ===
  const pc=plotCost(S.maxPlots),sc=stallCost(S.maxAnimals);
  const plotMax=S.maxPlots>=MAX_PLOTS, stallMax=S.maxAnimals>=MAX_STALLS;
  h+='<div class="bsec"><h3>📐 Bygg ut</h3><div class="bgrid">';
  if(plotMax) h+='<div class="bcard owned"><div class="be">🌱</div><div class="bn">Alla odlingsrutor</div><div class="bc">✅ Fullt utbyggt!</div><div class="bd">'+S.maxPlots+' rutor</div></div>';
  else h+=`<div class="bcard ${S.coins<pc?'locked':''}" onclick="buyPlot()"><div class="be">🌱</div><div class="bn">+1 Odlingsruta</div><div class="bc">💰 ${pc}</div><div class="bd">Har ${S.maxPlots}/${MAX_PLOTS} rutor</div></div>`;
  const stallName=S.maxAnimals<=1?'Litet stall':S.maxAnimals<=3?'Stall':S.maxAnimals<=5?'Stort stall':'Jättestall';
  if(stallMax) h+=`<div class="bcard owned"><div class="be">🐄</div><div class="bn">${stallName}</div><div class="bc">✅ Fullt utbyggt!</div><div class="bd">${S.maxAnimals} platser</div></div>`;
  else h+=`<div class="bcard ${S.coins<sc?'locked':''}" onclick="buyStall()"><div class="be">🐄</div><div class="bn">+1 Stallplats</div><div class="bc">💰 ${sc}</div><div class="bd">${stallName} — ${S.maxAnimals}/${MAX_STALLS} platser</div></div>`;
  h+='</div></div>';

  // === BUILDINGS ===
  h+='<div class="bsec"><h3>🏗️ Byggnader</h3><div class="bgrid">';
  for(const[id,b]of Object.entries(BUILDINGS)){
    const own=!!S.buildings[id],ok=S.coins>=b.c&&S.level>=b.lv;
    h+=`<div class="bcard ${own?'owned':!ok?'locked':''}" onclick="${own?'':`buyB('${id}')`}"><div class="be">${b.e}</div><div class="bn">${b.n}</div><div class="bc">${own?'✅ Köpt!':`💰 ${b.c}`}</div><div class="bd">${b.d}${S.level<b.lv&&!own?` (Nivå ${b.lv})`:''}</div></div>`;
  }
  h+='</div></div>';

  // === DECORATIONS ===
  const ownedDecoCount=Object.keys(S.decorations||{}).length;
  h+='<div class="bsec"><h3>🎀 Prydnader <small style="color:#999;font-weight:400">('+ownedDecoCount+'/12 — gör gården finare!)</small></h3><div class="bgrid">';
  for(const[id,d]of Object.entries(DECOS)){
    const own=!!S.decorations[id],ok=S.coins>=d.c&&ownedDecoCount<12;
    h+=`<div class="bcard ${own?'owned':!ok?'locked':''}" onclick="${own?'':`buyDeco('${id}')`}"><div class="be">${d.e}</div><div class="bn">${d.n}</div><div class="bc">${own?'✅ Köpt!':`💰 ${d.c}`}</div><div class="bd">${d.d}</div></div>`;
  }
  h+='</div></div>';

  p.innerHTML=h;
  // Draw canvas after DOM update
  const cv=document.getElementById('farmCv');
  if(cv)drawFarm(cv);
}


// ===== ACTIONS =====
function selSeed(id){S.selectedSeed=id;rFarm();}

function plant(i){
  const s=SEEDS[S.selectedSeed];
  if(S.coins<s.c){if(S.coins<4&&S.neighborDebt<=0)offerNeighborHelp();else toast('💰 Inte tillräckligt!');return;}
  S.coins-=s.c;S.plots[i]={type:S.selectedSeed,elapsed:0,ready:false,watered:false};
  // Auto-water if sprinkler or rainy
  if(S.hasSprinkler||S.weather==='rainy')S.plots[i].watered=true;
  toast(`${s.e} Planterade ${s.n}!`);render();
}

function water(i){
  const pl=S.plots[i];if(!pl||!pl.type||pl.ready||pl.watered)return;
  pl.watered=true;toast('💧 Vattnat!');render();
}

function harvest(i){
  const pl=S.plots[i],s=SEEDS[pl.type];
  S.plots[i]={type:null,elapsed:0,ready:false,watered:false};
  addInv(pl.type,1);addXP(s.xp);toast(`${s.e} Skördade ${s.n}! +${s.xp}⭐`);render();
}

function buyPlot(){
  if(S.maxPlots>=MAX_PLOTS){toast('🌱 Alla odlingsrutor är utbyggda!');return;}
  const c=plotCost(S.maxPlots);if(S.coins<c){if(S.coins<4&&S.neighborDebt<=0)offerNeighborHelp();else toast('💰 Inte tillräckligt!');return;}
  S.coins-=c;S.maxPlots++;S.plots.push({type:null,elapsed:0,ready:false,watered:false});addXP(5);
  toast(`🌱 Ny odlingsruta! (${S.maxPlots} totalt)`);render();
}
function buyStall(){
  if(S.maxAnimals>=MAX_STALLS){toast('🐔 Stallet är fullt utbyggt!');return;}
  const c=stallCost(S.maxAnimals);if(S.coins<c){toast('💰 Inte tillräckligt!');return;}
  S.coins-=c;S.maxAnimals++;addXP(5);toast(`🐔 Ny stallplats! (${S.maxAnimals} totalt)`);render();
}

function showBuyA(){
  if(S.animals.length>=S.maxAnimals){toast('🐔 Inga platser!');return;}
  let h='<h2>🐔 Köp djur</h2><div class="modal-opts">';
  for(const[id,a]of Object.entries(ANIMALS))h+=`<div class="mopt" onclick="buyA('${id}')">${a.e} ${a.n} — ${a.c} 💰<br><small>Ger: ${a.prod} ${a.pn} · Äter: ${a.food}</small></div>`;
  h+='</div><button class="mclose" onclick="closeM()">Stäng</button>';
  document.getElementById('mc').innerHTML=h;document.getElementById('modal').classList.add('show');
}

function buyA(type){
  if(S.animals.length>=S.maxAnimals){toast('🐔 Inga platser!');closeM();return;}
  const a=ANIMALS[type];if(S.coins<a.c){if(S.coins<4&&S.neighborDebt<=0)offerNeighborHelp();else toast('💰 Inte tillräckligt!');return;}
  S.coins-=a.c;S.animals.push({type,name:a.n,happiness:100,elapsed:0,readyToCollect:false,hungry:false,hungerTimer:0,fedCount:0});
  closeM();toast(`${a.e} Köpte en ${a.n}!`);render();
}

function interactA(i){
  const a=S.animals[i],t=ANIMALS[a.type];
  if(a.hungry){
    // Try to feed – find matching food in inventory
    const foodSeed=Object.entries(SEEDS).find(([id,s])=>s.e===t.food);
    const foodKey=foodSeed?foodSeed[0]:null;
    if(foodKey&&(S.inventory[foodKey]||0)>0){
      S.inventory[foodKey]--;a.hungry=false;a.hungerTimer=0;a.happiness=Math.min(100,a.happiness+25);a.fedCount++;
      addXP(2);toast(`${t.food} Matade ${a.name}! 😋`);
    } else {
      toast(`${t.food} Du behöver ${t.food} i lagret!`);
    }
  } else if(a.readyToCollect){
    a.readyToCollect=false;a.elapsed=0;a.happiness=Math.min(100,a.happiness+10);
    addInv(t.pn,1);addXP(t.xp);toast(`${t.prod} Samlade ${t.pn}!`);
  } else {
    a.happiness=Math.min(100,a.happiness+15);toast(`${t.e} Du klappade ${a.name}! 💕`);
  }
  render();
}

function sell(ci){
  const c=S.customers[ci];if((S.inventory[c.wants]||0)<c.amount)return;
  S.inventory[c.wants]-=c.amount;
  let bonus=0,tips=[];
  if(S.buildings.windmill){const b=Math.floor(c.price*.2);bonus+=b;tips.push('väderkvarn +'+b);}
  if(S.buildings.fence){const b=Math.floor(c.price*.15);bonus+=b;tips.push('staket +'+b);}
  S.coins+=c.price+bonus;addXP(c.amount*2);S.customers.splice(ci,1);
  toast(`💰 +${c.price+bonus} mynt!${tips.length?' ('+tips.join(', ')+')':''}`);render();
}

function buyB(id){
  const b=BUILDINGS[id];if(!b||S.buildings[id])return;
  if(S.coins<b.c){toast('💰 Inte tillräckligt!');return;}
  if(S.level<b.lv){toast(`⭐ Nivå ${b.lv} krävs!`);return;}
  S.coins-=b.c;S.buildings[id]=true;addXP(Math.floor(b.c/10));
  if(id==='sprinkler'){S.hasSprinkler=true;S.plots.forEach(p=>{if(p.type)p.watered=true;});toast('💦 Vattenspridare! Allt vattnas nu automatiskt!');}
  else toast(`${b.e} ${b.n} byggt!`);
  render();
}

function buyDeco(id){
  const d=DECOS[id];if(!d||S.decorations[id])return;
  if(Object.keys(S.decorations).length>=12){toast('🎀 Max 12 prydnader!');return;}
  if(S.coins<d.c){toast('💰 Inte tillräckligt!');return;}
  S.coins-=d.c;S.decorations[id]=true;
  toast(`${d.e} ${d.n} placerad!`);render();
}

function upgHouse(){
  if(S.houseLevel>=HOUSE_UPG.length-1)return;
  const nx=HOUSE_UPG[S.houseLevel+1];
  if(S.coins<nx.c){toast('💰 Inte tillräckligt!');return;}
  if(nx.lv&&S.level<nx.lv){toast(`⭐ Nivå ${nx.lv} krävs!`);return;}
  S.coins-=nx.c;S.houseLevel++;addXP(Math.floor(nx.c/8));
  toast(`${nx.e} Uppgraderade till ${nx.n}!`);render();
}

function updateNeighbor(){
  if(S.neighborDebt<=0)return;
  S.neighborTimer++;
  // Mood worsens over time
  if(S.neighborTimer<120)S.neighborMood='happy';
  else if(S.neighborTimer<240)S.neighborMood='waiting';
  else if(S.neighborTimer<400)S.neighborMood='annoyed';
  else S.neighborMood='angry';
  // If angry, take a decoration every ~200 ticks
  if(S.neighborMood==='angry'&&S.neighborTimer%200===0){
    const decos=Object.keys(S.decorations||{});
    if(decos.length>0){
      const taken=decos[Math.floor(Math.random()*decos.length)];
      const d=DECOS[taken];
      delete S.decorations[taken];
      toast(`😠 Grannen tog din ${d?d.n:'prydnad'} som betalning!`);
      S.neighborDebt=Math.max(0,S.neighborDebt-5);
      if(S.neighborDebt<=0){S.neighborDebt=0;S.neighborMood='happy';S.neighborTimer=0;toast('👩‍🌾 "Nu är vi kvitt!"');}

// ===== GAME LOOP =====
function gameLoop(){
  const sp=growSpeed();
  // Grow crops (only if watered or has sprinkler)
  S.plots.forEach(p=>{
    if(p.type&&!p.ready){
      if(p.watered||S.hasSprinkler){p.elapsed+=sp;if(p.elapsed>=SEEDS[p.type].t)p.ready=true;}
    }
  });
  // Animals: production, hunger, happiness
  S.animals.forEach(a=>{
    if(!a.hungry){
      if(!a.readyToCollect){a.elapsed++;if(a.elapsed>=ANIMALS[a.type].intr)a.readyToCollect=true;}
      a.hungerTimer++;
      if(a.hungerTimer>=80){a.hungry=true;a.hungerTimer=0;}
    }
    // Happiness: flowers help, bigger stall = slower decay
    let decay=a.hungry?1.5:(S.maxAnimals>=3?.2:.5);
    if(S.buildings.flowers&&!a.hungry)a.happiness=Math.min(100,a.happiness+.3);
    a.happiness=Math.max(0,a.happiness-decay);
  });

  // Well: auto re-water dried crops occasionally
  if(S.buildings.well){
    S.plots.forEach(p=>{if(p.type&&!p.ready&&!p.watered&&!S.hasSprinkler&&Math.random()<.08)p.watered=true;});
  }

  // Pond: generate fish every ~25 seconds (silent — shows in inventory)
  if(S.buildings.pond){
    if(!S.pondTimer)S.pondTimer=0;
    S.pondTimer++;
    if(S.pondTimer>=50){S.pondTimer=0;addInv('Fisk',1);}
  }

  // Silo: bonus harvest every ~35 seconds (silent — shows in inventory)
  if(S.buildings.silo){
    if(!S.siloTimer)S.siloTimer=0;
    S.siloTimer++;
    if(S.siloTimer>=70){S.siloTimer=0;
      const crops=Object.keys(SEEDS);const rnd=crops[Math.floor(Math.random()*crops.length)];
      addInv(rnd,1);}
  }

  // Proactive neighbor: if stuck with too few coins for 30s, offer help
  if(S.coins<4&&S.neighborDebt<=0){
    if(!S._brokeTimer)S._brokeTimer=0;
    S._brokeTimer++;
    if(S._brokeTimer>=30)offerNeighborHelp();
  }else{S._brokeTimer=0;}

  // Game over detection
  checkGameOver();

  updateNeighbor();updWeather();updSeason();save();render();
}

function spawnCust(){
  const mx=S.buildings.mailbox?4:3;if(S.customers.length>=mx)return;
  const all=[];
  // Only include seeds the player can actually grow (season or greenhouse)
  for(const[id,s]of Object.entries(SEEDS)){
    if(s.season&&s.season!==S.season&&!S.buildings.greenhouse)continue;
    all.push({id,e:s.e,n:s.n,bv:s.v});
  }
  // Only include animal products the player actually has animals for
  for(const[id,a]of Object.entries(ANIMALS)){
    if(S.animals.some(x=>x.type===id))all.push({id:a.pn,e:a.prod,n:a.pn,bv:a.v});
  }
  if(S.buildings.pond)all.push({id:'Fisk',e:'🐟',n:'Fisk',bv:15});
  if(!all.length)return; // nothing available to sell
  // Weight towards items the player has in stock (3x more likely)
  const weighted=[];
  all.forEach(it=>{
    const inStock=(S.inventory[it.id]||0)>0;
    weighted.push(it);
    if(inStock){weighted.push(it);weighted.push(it);}
  });
  const it=weighted[Math.floor(Math.random()*weighted.length)],am=Math.floor(Math.random()*3)+1;
  S.customers.push({name:CNAMES[Math.floor(Math.random()*CNAMES.length)],emoji:CEMOJI[Math.floor(Math.random()*CEMOJI.length)],wants:it.id,wantE:it.e,wantN:it.n,amount:am,price:it.bv*am+Math.floor(Math.random()*5)+1});
  render();
}

// ===== GAME OVER =====
function isStuck(){
  // Can the neighbor still help? (no existing debt)
  if(S.neighborDebt<=0)return false;

  // Find cheapest plantable seed
  const cheapest=Math.min(...Object.values(SEEDS).filter(s=>!s.season||s.season===S.season||S.buildings.greenhouse).map(s=>s.c));
  // Can afford to plant?
  if(S.coins>=cheapest)return false;

  // Any crops growing or ready to harvest?
  if(S.plots.some(p=>p.type))return false;

  // Any animal producing or ready to collect?
  if(S.animals.some(a=>a.readyToCollect))return false;
  // Any non-hungry animal still producing?
  if(S.animals.some(a=>!a.hungry))return false;
  // Any hungry animal we can feed? (have matching food in inventory)
  if(S.animals.some(a=>{
    if(!a.hungry)return false;
    const t=ANIMALS[a.type];
    const foodSeed=Object.entries(SEEDS).find(([,s])=>s.e===t.food);
    return foodSeed&&(S.inventory[foodSeed[0]]||0)>0;
  }))return false;

  // Passive generators running?
  if(S.buildings.pond||S.buildings.silo)return false;

  // Anything in inventory that a current customer wants?
  if(S.customers.some(c=>(S.inventory[c.wants]||0)>=c.amount))return false;

  // Anything in inventory at all? New customers might want it
  const totalInv=Object.values(S.inventory).reduce((a,b)=>a+b,0);
  if(totalInv>0)return false;

  return true;
}

function checkGameOver(){
  if(S._gameOver)return;
  if(!isStuck()){S._stuckTimer=0;return;}
  // Grace period: must be stuck for 10 consecutive seconds
  if(!S._stuckTimer)S._stuckTimer=0;
  S._stuckTimer++;
  if(S._stuckTimer<10)return;
  S._gameOver=true;
  showGameOver();
}

function showGameOver(){
  let h='<h2>😢 Spelet är slut</h2>';
  h+='<p style="color:#666;margin:10px 0;line-height:1.5">Du har inga pengar, inget i lagret och inget som växer. Det finns tyvärr inget mer du kan göra.</p>';
  h+='<div style="background:#f8f3e8;border-radius:12px;padding:12px;margin:10px 0;text-align:left;font-size:.95em">';
  h+='<div style="font-weight:700;color:#5a3e1b;margin-bottom:4px">📊 Din gård</div>';
  h+=`<div>⭐ Nivå ${S.level} · 📅 Dag ${S.dayCount}</div>`;
  h+=`<div>🌱 ${S.maxPlots} odlingsrutor · 🐔 ${S.animals.length} djur</div>`;
  h+=`<div>🏗️ ${Object.keys(S.buildings).length} byggnader</div>`;
  h+='</div>';
  h+='<div class="modal-opts">';
  h+='<div class="mopt" onclick="restartSlot()" style="background:#e8f5d0;border-color:#6B8E23">🌱 Börja om på nytt</div>';
  h+='<div class="mopt" onclick="gameOverToSlots()">👤 Byt till annan spelare</div>';
  h+='</div>';
  document.getElementById('mc').innerHTML=h;document.getElementById('modal').classList.add('show');
}

function restartSlot(){
  localStorage.removeItem(slotKey(currentSlot));
  resetDefaults();S._gameOver=false;S._stuckTimer=0;
  closeM();save();updWVis();render();showNaming();
}

function gameOverToSlots(){
  localStorage.removeItem(slotKey(currentSlot));
  S._gameOver=false;S._stuckTimer=0;
  closeM();showSlotSelector();
}

// ===== NAMING & FARMER SETUP =====
function showNaming(){
  let h='<h2>🌻 Välkommen!</h2>';
  h+='<p style="color:#666;margin:8px 0">Vad heter du, bansen?</p>';
  h+='<input id="farmerNameInput" type="text" placeholder="T.ex. Erik" maxlength="16" style="width:90%;padding:12px;border-radius:12px;border:3px solid #6B8E23;font-size:1.15em;text-align:center;margin:6px 0;outline:none">';
  h+='<p style="color:#666;margin:8px 0">Välj din karaktär:</p>';
  h+='<div class="fe-options" style="margin-bottom:10px">';
  FARMER_SKINS.forEach((s,i)=>{h+='<div class="fe-opt'+(i===0?' sel':'')+'" onclick="pickSetupSkin('+i+',this)">'+s+'</div>';});
  h+='</div>';
  h+='<p style="color:#666;margin:8px 0">Vad vill du kalla din bondgård?</p>';
  h+='<input id="farmNameInput" type="text" placeholder="T.ex. Solrosgården" maxlength="24" style="width:90%;padding:12px;border-radius:12px;border:3px solid #6B8E23;font-size:1.15em;text-align:center;margin:6px 0;outline:none">';
  h+='<div class="modal-opts"><div class="mopt" onclick="confirmSetup()">🌱 Starta!</div></div>';
  document.getElementById('mc').innerHTML=h;document.getElementById('modal').classList.add('show');
  setTimeout(()=>{const inp=document.getElementById('farmerNameInput');if(inp)inp.focus();},100);
}
let _setupSkin=0;
function pickSetupSkin(i,el){
  _setupSkin=i;
  el.parentElement.querySelectorAll('.fe-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}
function confirmSetup(){
  const fInp=document.getElementById('farmerNameInput');
  const nInp=document.getElementById('farmNameInput');
  S.farmerName=(fInp&&fInp.value.trim())?fInp.value.trim():'Bansen';
  S.farmerSkin=_setupSkin;
  S.farmName=(nInp&&nInp.value.trim())?nInp.value.trim():'Min Bondgård';
  closeM();save();render();toast(`🌻 Välkommen till ${S.farmName}, ${S.farmerName}!`);
}

// ===== FARMER EDITOR =====
function showFarmerEditor(){
  let h='<h2>👤 Anpassa din bonde</h2>';
  // Preview
  const skin=FARMER_SKINS[S.farmerSkin]||'👩‍🌾';
  const hat=FARMER_HATS[S.farmerHat]||'';
  h+='<div style="text-align:center"><div class="fe-preview" id="fePreview">'+skin+(hat?'<span class="fa-hat">'+hat+'</span>':'')+'</div></div>';
  // Farmer name
  h+='<div class="fe-section"><label>Namn</label>';
  h+='<input id="feNameInput" type="text" value="'+(S.farmerName||'').replace(/"/g,'&quot;')+'" placeholder="Bondens namn" maxlength="16" style="width:90%;padding:10px;border-radius:10px;border:3px solid #6B8E23;font-size:1.05em;text-align:center;outline:none"></div>';
  // Farm name
  h+='<div class="fe-section"><label>Gårdsnamn</label>';
  h+='<input id="feFarmNameInput" type="text" value="'+(S.farmName||'').replace(/"/g,'&quot;')+'" placeholder="Gårdens namn" maxlength="24" style="width:90%;padding:10px;border-radius:10px;border:3px solid #6B8E23;font-size:1.05em;text-align:center;outline:none"></div>';
  // Skin
  h+='<div class="fe-section"><label>Karaktär</label><div class="fe-options">';
  FARMER_SKINS.forEach((s,i)=>{h+='<div class="fe-opt'+(i===S.farmerSkin?' sel':'')+'" onclick="fePickSkin('+i+',this)">'+s+'</div>';});
  h+='</div></div>';
  // Hat
  h+='<div class="fe-section"><label>Hatt</label><div class="fe-options">';
  FARMER_HATS.forEach((s,i)=>{h+='<div class="fe-opt'+(i===S.farmerHat?' sel':'')+'" onclick="fePickHat('+i+',this)">'+(s||'❌')+'</div>';});
  h+='</div></div>';
  h+='<div class="modal-opts"><div class="mopt" onclick="saveFarmerEdit()" style="background:#e8f5d0;border-color:#6B8E23">✅ Spara</div></div>';
  h+='<button class="mclose" onclick="closeM()">Avbryt</button>';
  document.getElementById('mc').innerHTML=h;document.getElementById('modal').classList.add('show');
}
function feUpdatePreview(){
  const el=document.getElementById('fePreview');if(!el)return;
  const skin=FARMER_SKINS[S._feSkin??S.farmerSkin]||'👩‍🌾';
  const hat=FARMER_HATS[S._feHat??S.farmerHat]||'';
  el.innerHTML=skin+(hat?'<span class="fa-hat">'+hat+'</span>':'');
}
function fePickSkin(i,el){S._feSkin=i;el.parentElement.querySelectorAll('.fe-opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');feUpdatePreview();}
function fePickHat(i,el){S._feHat=i;el.parentElement.querySelectorAll('.fe-opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');feUpdatePreview();}
function saveFarmerEdit(){
  const nameInp=document.getElementById('feNameInput');
  const farmInp=document.getElementById('feFarmNameInput');
  S.farmerName=(nameInp&&nameInp.value.trim())?nameInp.value.trim():'Bansen';
  S.farmName=(farmInp&&farmInp.value.trim())?farmInp.value.trim():'Min Bondgård';
  if(S._feSkin!==undefined){S.farmerSkin=S._feSkin;delete S._feSkin;}
  if(S._feHat!==undefined){S.farmerHat=S._feHat;delete S._feHat;}
  closeM();save();render();toast('👤 Sparade ändringar!');
}

// ===== START =====
migrateOldSave();
const meta=getMeta();currentSlot=meta.active||0;
const wasLoaded=load();updWVis();render();
if(wasLoaded)toast('💾 Välkommen tillbaka!');
else showNaming();
setInterval(gameLoop,1000);setInterval(spawnCust,15000);setTimeout(spawnCust,5000);
</script>
